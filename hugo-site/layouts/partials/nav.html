<header class="site-header">
  <div class="banner-container">
    <img src="{{ "/images/glitch-banner(white).png" | relURL }}" alt="Digital Artifacts Banner" class="banner-image">
    <a href="{{ "/" | relURL }}" class="logo-overlay" aria-label="home">
      <img src="{{ "/images/Digital_Artifacts_Logo(no_background).png" | relURL }}" alt="Digital Artifacts Logo" class="site-logo">
    </a>
  </div>
  <button class="hamburger" aria-expanded="false" aria-controls="primary-nav-menu" aria-label="toggle navigation">
    <span class="hamburger-label">menu</span>
    <span class="hamburger-icon" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </span>
  </button>
  <nav id="primary-nav" aria-label="primary">
    <ul class="nav-links" id="primary-nav-menu">
      <li><a href="{{ "/" | relURL }}" {{ if .IsHome }}class="active"{{ end }}>home</a></li>
      <li><a href="{{ "/glyphs/" | relURL }}" {{ if eq .Section "glyphs" }}class="active"{{ end }}>design (glyphs)</a></li>
      <li><a href="{{ "/sigils/" | relURL }}" {{ if eq .Section "sigils" }}class="active"{{ end }}>code (sigils)</a></li>
      <li><a href="{{ "/scrolls/" | relURL }}" {{ if eq .Section "scrolls" }}class="active"{{ end }}>writing (scrolls)</a></li>
      <li><a href="{{ "/signals/" | relURL }}" {{ if eq .Section "signals" }}class="active"{{ end }}>sound (signals)</a></li>
      <li><a href="{{ "/info/" | relURL }}" {{ if eq .Section "info" }}class="active"{{ end }}>info</a></li>
    </ul>
  </nav>
</header>
